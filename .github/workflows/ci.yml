name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: saas_user
          POSTGRES_PASSWORD: dev_password_123
          POSTGRES_DB: saas_financeiro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U saas_user -d saas_financeiro_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-secret-key-at-least-32-characters-long
      DATABASE_URL: postgresql+asyncpg://saas_user:dev_password_123@localhost:5432/saas_financeiro_test
      AI_PROVIDER: claude
      ANTHROPIC_API_KEY: dummy-key-for-ci
      WHATSAPP_VERIFY_TOKEN: ci-verify-token
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ENVIRONMENT: test
      DEBUG: false
      REDIS_URL: redis://localhost:6379/0
      WHATSAPP_PROVIDER: cloud_api
      WHATSAPP_ACCESS_TOKEN: dummy-token-ci
      WHATSAPP_PHONE_NUMBER_ID: 123456789
      WHATSAPP_BUSINESS_ACCOUNT_ID: 123456789
      WHATSAPP_API_VERSION: v21.0
      OPENAI_API_KEY: dummy-key-ci
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Format check (ruff)
        working-directory: backend
        run: ruff format --check .

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Tests with coverage
        working-directory: backend
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=85 -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/.coverage
          retention-days: 7

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: saas_user
          POSTGRES_PASSWORD: dev_password_123
          POSTGRES_DB: saas_financeiro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U saas_user -d saas_financeiro_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-secret-key-at-least-32-characters-long
      DATABASE_URL: postgresql+psycopg://saas_user:dev_password_123@localhost:5432/saas_financeiro_test
      AI_PROVIDER: claude
      ANTHROPIC_API_KEY: dummy-key-for-ci
      WHATSAPP_VERIFY_TOKEN: ci-verify-token

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Format check (ruff)
        working-directory: backend
        run: ruff format --check .

      - name: Tests with coverage
        working-directory: backend
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=85 -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/.coverage
          retention-days: 7
